<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/PreepPright-Yv6Az5Se.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreppRight | Premium Learning Platform</title>
  </head>
  <body>
    <style>
      #preloader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0a0f1e;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'DM Sans', sans-serif;
      }
      .loader-content {
        display: flex;
        gap: 8px;
      }
      .loader-dot {
        width: 14px; height: 14px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 50%;
        animation: dot-bounce 0.6s infinite alternate;
        box-shadow: 0 0 15px rgba(99,102,241,0.4);
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-bounce {
        to { transform: translateY(-15px); opacity: 0.4; filter: blur(1px); }
      }
      .loader-text {
        margin-top: 24px;
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
    <div id="preloader">
      <div class="loader-content">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <div class="loader-text">Loading PreppRight</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
